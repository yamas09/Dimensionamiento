openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API for Solar PV System Dimensioning
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: sfv
    description: Solar PV Dimensioning
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /sfv/calcular:
    post:
      operationId: calcularSFV
      tags: [sfv]
      summary: Calcular dimensionamiento del sistema fotovoltaico
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SFVInput"
      responses:
        "200":
          description: Resultados del dimensionamiento
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SFVResultado"
        "400":
          description: Error de validación
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Carga:
      type: object
      properties:
        elemento:
          type: string
        tipoCarga:
          type: string
          enum: [AC, DC]
        cantidad:
          type: integer
        potencia:
          type: number
        horas:
          type: number
      required:
        - elemento
        - tipoCarga
        - cantidad
        - potencia
        - horas

    RegistroRecibo:
      type: object
      properties:
        consumo:
          type: number
        precio:
          type: number
      required:
        - consumo
        - precio

    SFVInput:
      type: object
      properties:
        latitud:
          type: number
        longitud:
          type: number
        hsp:
          type: number
        tipoSistema:
          type: string
          enum: ["aislado", "interconectado", "bombeo"]
        metodoPerfil:
          type: string
          enum: ["cargas", "recibo"]
        cargas:
          type: array
          items:
            $ref: "#/components/schemas/Carga"
        registrosRecibo:
          type: array
          items:
            $ref: "#/components/schemas/RegistroRecibo"
        diasPeriodoRecibo:
          type: integer
        panelVnom:
          type: number
        panelPotencia:
          type: number
        panelImp:
          type: number
        panelVmp:
          type: number
        panelIsc:
          type: number
        panelVoc:
          type: number
        tipoBateria:
          type: string
          enum: ["Plomo", "Litio"]
        diasAutonomia:
          type: number
        bateriaAh:
          type: number
          description: Capacidad comercial de la batería seleccionada [Ah]
        bateriaV:
          type: number
          description: Voltaje nominal de la batería seleccionada [V]
        voltajeNominalBomba:
          type: integer
          enum: [120, 400]
          description: Voltaje nominal de la bomba (120 V monofásico / 400 V trifásico)
        volumenLitros:
          type: number
          description: Volumen a bombear por día [L]
        alturaDebajo:
          type: number
          description: Profundidad nivel agua → suelo [m]
        alturaEncima:
          type: number
          description: Altura suelo → tanque [m]
        usarHspParaBombeo:
          type: boolean
        horasBombeoManual:
          type: number
        # Campos económicos
        costoPorPanel:
          type: number
        costoInversor:
          type: number
        costoBaterias:
          type: number
        costoProtecciones:
          type: number
        costoInstalacion:
          type: number
        costoCableado:
          type: number
        costoBomba:
          type: number
        costoVariador:
          type: number
        precioKwh:
          type: number
        precioKwhConvencional:
          type: number
        tipoCombustible:
          type: string
          enum: ["electrico", "diesel"]
        consumoDieselAnual:
          type: number
        precioDieselLitro:
          type: number
      required:
        - latitud
        - longitud
        - hsp
        - tipoSistema
        - metodoPerfil
        - panelVnom
        - panelPotencia
        - panelImp
        - panelVmp
        - panelIsc
        - panelVoc

    ResultadoPaneles:
      type: object
      properties:
        totalPaneles:
          type: integer
        panelesSerie:
          type: integer
        panelesParalelo:
          type: integer
        voltajeSistema:
          type: number
        corrienteSistema:
          type: number
      required:
        - totalPaneles
        - panelesSerie
        - panelesParalelo
        - voltajeSistema
        - corrienteSistema

    ResultadoBaterias:
      type: object
      properties:
        totalBaterias:
          type: integer
        bateriasSerie:
          type: integer
        bateriasParalelo:
          type: integer
        capacidadNominal:
          type: number
        capacidadComercial:
          type: number
        voltajeBateria:
          type: number
        dod:
          type: number
      required:
        - totalBaterias
        - bateriasSerie
        - bateriasParalelo
        - capacidadNominal
        - capacidadComercial
        - voltajeBateria
        - dod

    ResultadoInversor:
      type: object
      properties:
        corrienteMinima:
          type: number
      required:
        - corrienteMinima

    ResultadoRegulador:
      type: object
      properties:
        corrienteMinima:
          type: number
      required:
        - corrienteMinima

    ResultadoCableado:
      type: object
      properties:
        corrienteMinima:
          type: number
      required:
        - corrienteMinima

    ResultadoProtecciones:
      type: object
      properties:
        corrienteFusible:
          type: number
        breakerCC:
          type: number
        seccionadorVoltaje:
          type: number
        seccionadorCorriente:
          type: number
        sobretensionesVoltaje:
          type: number
        termomagneticoCorriente:
          type: number
      required:
        - corrienteFusible

    ResultadoAmbiental:
      type: object
      properties:
        energiaAnualKwh:
          type: number
        ahorroCo2PrimerAnio:
          type: number
        ahorroCo2TotalTon:
          type: number
        vectorAhorrosCo2:
          type: array
          items:
            type: number
        vectorDegradacion:
          type: array
          items:
            type: number
      required:
        - energiaAnualKwh
        - ahorroCo2PrimerAnio
        - ahorroCo2TotalTon
        - vectorAhorrosCo2
        - vectorDegradacion

    ResultadoEconomico:
      type: object
      properties:
        costoTotal:
          type: number
        precioKwh:
          type: number
        ahorroPrimerAnio:
          type: number
        ahorroTotal:
          type: number
        payback:
          type: number
          nullable: true
        vectorAhorros:
          type: array
          items:
            type: number
        ahorrosAcumulados:
          type: array
          items:
            type: number
        flujoCaja:
          type: array
          items:
            type: number
        costoConvencional:
          type: number
      required:
        - costoTotal
        - ahorroPrimerAnio
        - ahorroTotal
        - payback
        - vectorAhorros
        - ahorrosAcumulados
        - flujoCaja
        - costoConvencional

    SFVResultado:
      type: object
      properties:
        energiaDiariaKwh:
          type: number
        potenciaDemandaKw:
          type: number
        anguloInclinacion:
          type: number
        orientacion:
          type: string
        paneles:
          $ref: "#/components/schemas/ResultadoPaneles"
        baterias:
          $ref: "#/components/schemas/ResultadoBaterias"
        inversor:
          $ref: "#/components/schemas/ResultadoInversor"
        regulador:
          $ref: "#/components/schemas/ResultadoRegulador"
        cableado:
          $ref: "#/components/schemas/ResultadoCableado"
        protecciones:
          $ref: "#/components/schemas/ResultadoProtecciones"
        ambiental:
          $ref: "#/components/schemas/ResultadoAmbiental"
        economico:
          $ref: "#/components/schemas/ResultadoEconomico"
        bomba:
          type: object
          properties:
            potenciaHP: { type: number }
            potenciaKw: { type: number }
            potenciaHidraulicaW: { type: number }
            caudalM3s: { type: number }
          required: [potenciaHP, potenciaKw, potenciaHidraulicaW, caudalM3s]
        variador:
          type: object
          properties:
            corrienteMaxima: { type: number }
            tipo: { type: string }
            compatible: { type: boolean }
            voltajeNominal: { type: number }
          required: [corrienteMaxima]
      required:
        - energiaDiariaKwh
        - potenciaDemandaKw
        - paneles
        - cableado
        - ambiental

kind = "web"
previewPath = "/"
title = "Dimensionador SFV"
version = "1.0.0"
id = "artifacts/sfv-dimensionador"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21391
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/sfv-dimensionador run dev"

[services.env]
PORT = "21391"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/sfv-dimensionador", "run", "build"]
publicDir = "artifacts/sfv-dimensionador/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
